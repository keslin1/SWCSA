<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réalisations des élèves - swcsa</title>
    <style>
        :root {
            --rouge-grenat: #800000;
            --jaune-fonce: #CC9900;
            --blanc: #FFFFFF;
            --noir: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--blanc);
            color: var(--noir);
            line-height: 1.6;
            overflow-x: hidden; /* Important pour l'animation */
        }

        /* En-tête avec bouton retour */
        header {
            background-color: var(--rouge-grenat);
            color: var(--jaune-fonce);
            padding: 15px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .back-btn {
            text-decoration: none;
            color: var(--blanc);
            font-size: 24px;
            margin-right: 15px;
        }

        header h2 {
            font-size: 20px;
        }

        /* Titre de la page */
        .page-banner {
            background-color: var(--jaune-fonce);
            color: var(--rouge-grenat);
            padding: 20px;
            text-align: center;
            font-weight: bold;
        }

        /* Grille des réalisations */
        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 colonnes sur mobile */
            gap: 15px;
            padding: 15px;
        }

        /* Animation d'apparition */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gallery-item {
            border: 2px solid var(--jaune-fonce);
            border-radius: 8px;
            overflow: hidden;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* Pour l'animation */
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s ease-out forwards;
        }

        /* Force le format RATIO PORTRAIT (vertical) */
        .gallery-item img {
            width: 100%;
            aspect-ratio: 3 / 4; /* Ratio vertical (ex: 9cm x 12cm) */
            object-fit: cover; /* Coupe l'image pour qu'elle remplisse le cadre sans se déformer */
            display: block;
        }

        .student-name {
            padding: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: var(--rouge-grenat);
            background-color: #f9f9f9;
            border-top: 1px solid #eee;
        }

        /* Délais d'animation pour l'effet cascade */
        .gallery-item:nth-child(1) { animation-delay: 0.1s; }
        .gallery-item:nth-child(2) { animation-delay: 0.2s; }
        .gallery-item:nth-child(3) { animation-delay: 0.3s; }
        .gallery-item:nth-child(4) { animation-delay: 0.4s; }
        .gallery-item:nth-child(5) { animation-delay: 0.5s; }
        .gallery-item:nth-child(6) { animation-delay: 0.6s; }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">&#10094;</a>
    <h2>Talents formés</h2>
</header>

<div class="page-banner">
    Découvrez les plus belles œuvres de nos élèves 🤗🥰
</div>

<main>
    <div class="gallery-grid">
        <div class="gallery-item">
            <img src="eleve1.jpg" alt="Art par élève 1">
            <p class="student-name">Élève SWCSA</p>
        </div>

        <div class="gallery-item">
            <img src="eleve2.jpg" alt="Art par élève 2">
            <p class="student-name">Élève SWCSA</p>
        </div>

        <div class="gallery-item">
            <img src="eleve3.jpg" alt="Art par élève 3">
            <p class="student-name">Élève SWCSA</p>
        </div>

        <div class="gallery-item">
            <img src="eleve4.jpg" alt="Art par élève 4">
            <p class="student-name">Élève SWCSA</p>
        </div>

        <div class="gallery-item">
            <img src="eleve5.jpg" alt="Art par élève 5">
            <p class="student-name">Élève SWCSA</p>
        </div>

        <div class="gallery-item">
            <img src="eleve6.jpg" alt="Art par élève 6">
            <p class="student-name">Élève SWCSA</p>
        </div>
    </div>
</main>

<footer>
    <p>© 2026 SWCSA - Tous droits réservés.</p>
</footer>

</body>
</html>
